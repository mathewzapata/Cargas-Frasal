<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frasal</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <header class="topbar">
    <div class="logo">🚢 Cargas frasal</div>
    <div class="usuario" id="usuario-info">Cargando...</div>
    <button onclick="cerrarSesion()" style="
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 12px;
      font-family: 'Barlow', sans-serif;
  ">Salir</button>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="contenedor">

<!-- MENÚ LATERAL -->
    <nav class="sidebar">
      <ul>
        <li class="activo">📋 Flota</li>
        <li>📦 Manifiestos</li>
        <li>➕ Nuevo zarpe</li>
        <li>🔗 Vista cliente</li>
        <li>👥 Usuarios</li>
      </ul>
    </nav>
    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenido">
      <h1>Bienvenido a Cargas Frasal</h1>
      <p>Selecciona una opción del menú</p>
    </main>

  </div>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
